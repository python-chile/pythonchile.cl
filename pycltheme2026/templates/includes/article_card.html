<article
    class="bg-white dark:bg-gray-800 rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300 flex flex-col">
    {% if article.image %}
    <a href="{{ SITEURL }}/{{ article.url }}" class="block overflow-hidden">
        <img class="w-full h-48 object-cover transform hover:scale-105 transition-transform duration-500"
            src="{{ SITEURL }}/images/{{ article.image }}" alt="{{ article.title }}">
    </a>
    {% endif %}
    <div class="p-6 flex flex-col flex-grow">
        <div class="flex items-center text-sm text-gray-500 dark:text-gray-400 mb-2">
            <span
                class="bg-blue-100 text-blue-800 text-xs font-semibold mr-2 px-2.5 py-0.5 rounded dark:bg-blue-200 dark:text-blue-800">{{
                article.category }}</span>
            <span>{{ article.locale_date }}</span>
        </div>
        <h2 class="text-xl font-bold mb-2 text-gray-900 dark:text-white line-clamp-2 min-h-[3.5rem]">
            <a href="{{ SITEURL }}/{{ article.url }}"
                class="hover:text-python-blue dark:hover:text-python-yellow transition-colors duration-200">{{
                article.title }}</a>
        </h2>
        <p class="text-gray-600 dark:text-gray-300 mb-4 line-clamp-3 text-sm flex-grow">
            {{ article.summary|striptags|truncate(120) }}
        </p>
        <div class="flex justify-between items-center mt-auto pt-4 border-t border-gray-100 dark:border-gray-700">
            <a href="{{ SITEURL }}/{{ article.url }}"
                class="inline-flex items-center text-python-blue dark:text-python-yellow hover:underline text-sm font-semibold">
                Leer más
                <svg class="ml-1 w-4 h-4" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd"
                        d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
                        clip-rule="evenodd"></path>
                </svg>
            </a>
            {% if article.author %}
            <a href="{{ SITEURL }}/{{ article.author.url }}"
                class="text-xs text-gray-400 hover:text-python-blue transition-colors font-medium">{{ article.author
                }}</a>
            {% endif %}
        </div>
    </div>
</article>
