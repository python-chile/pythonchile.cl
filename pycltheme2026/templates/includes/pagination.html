{% if articles_page.has_other_pages() %}
<nav class="flex justify-center mt-12 mb-8" aria-label="Paginación">
    <ul class="inline-flex -space-x-px text-sm">
        {% if articles_page.has_previous() %}
        <li>
            <a href="{{ SITEURL }}/{{ articles_page.previous_page.url if articles_page.previous_page else articles_paginator.page(articles_page.previous_page_number()).url }}"
                class="flex items-center justify-center px-4 h-10 ms-0 leading-tight text-gray-500 bg-white border border-e-0 border-gray-300 rounded-s-lg hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white transition-colors">
                <span class="sr-only">Anterior</span>
                <svg class="w-2.5 h-2.5 rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 6 10">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5 1 1 5l4 4" />
                </svg>
            </a>
        </li>
        {% endif %}

        {% for n in articles_paginator.page_range %}
        <li>
            <a href="{{ SITEURL }}/{{ articles_paginator.page(n).url }}"
                class="flex items-center justify-center px-4 h-10 leading-tight {% if n == articles_page.number %}text-blue-600 border border-blue-300 bg-blue-50 hover:bg-blue-100 hover:text-blue-700 dark:border-gray-700 dark:bg-gray-700 dark:text-white{% else %}text-gray-500 bg-white border border-gray-300 hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white{% endif %} transition-colors">
                {{ n }}
            </a>
        </li>
        {% endfor %}

        {% if articles_page.has_next() %}
        <li>
            <a href="{{ SITEURL }}/{{ articles_page.next_page.url if articles_page.next_page else articles_paginator.page(articles_page.next_page_number()).url }}"
                class="flex items-center justify-center px-4 h-10 leading-tight text-gray-500 bg-white border border-gray-300 rounded-e-lg hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white transition-colors">
                <span class="sr-only">Siguiente</span>
                <svg class="w-2.5 h-2.5 rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 6 10">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="m1 9 4-4-4-4" />
                </svg>
            </a>
        </li>
        {% endif %}
    </ul>
</nav>
{% endif %}
