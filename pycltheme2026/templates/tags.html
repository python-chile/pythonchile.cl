{% extends "base.html" %}

{% block title %}Etiquetas - {{ SITENAME }}{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto">
    <div class="mb-12 border-b pb-6">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Etiquetas</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-2">Navega por los temas específicos tratados en nuestro blog.</p>
    </div>

    <div class="flex flex-wrap gap-3">
        {% for tag, articles in tags|sort %}
        <a href="{{ SITEURL }}/{{ tag.url }}"
            class="px-4 py-2 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded-full hover:bg-python-blue hover:text-white dark:hover:bg-python-blue dark:hover:text-white transition-all duration-200 text-sm font-medium border border-transparent hover:shadow-sm flex items-center">
            <span class="mr-2">#</span>
            {{ tag }}
            <span class="ml-2 text-xs opacity-60">({{ articles|count }})</span>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
