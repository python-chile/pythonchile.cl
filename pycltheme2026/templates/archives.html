{% extends "base.html" %}

{% block title %}Archivo del Blog - {{ SITENAME }}{% endblock %}

{% block content %}
<section class="max-w-6xl mx-auto">
  <div class="mb-12 border-b pb-6">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Archivo de Entradas</h1>
    <p class="text-gray-500 dark:text-gray-400 mt-2">Historial completo de todas nuestras publicaciones.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    {% for article in dates %}
    {% include 'includes/article_card.html' %}
    {% endfor %}
  </div>
</section>
{% endblock %}
